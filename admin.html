<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Добавить университет</h2>

<input id="uni" placeholder="Название"><br><br>
<input id="city" placeholder="Город"><br><br>
<input id="direction" placeholder="Направление"><br><br>

<select id="chance">
  <option value="low">low</option>
  <option value="mid">mid</option>
  <option value="high">high</option>
</select><br><br>

<label>
  English:
  <input type="checkbox" id="eng">
</label><br><br>

<button onclick="addUni()">Добавить</button>

<hr>

<h2>Список</h2>
<div id="list"></div>

<script>
const SUPABASE_URL = 'https://hbkltwkspfbnjoltfxby.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LH9wJzvN8Img4roHKalcKQ_CiRxtp3d';

async function load() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/universities?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  document.getElementById('list').innerHTML = data.map(x => `
    <div>
      ${x.uni} (${x.city})
      <button onclick="deleteUni(${x.id})">❌</button>
    </div>
  `).join('');
}

async function addUni() {
  const uni = document.getElementById('uni').value;
  const city = document.getElementById('city').value;
  const direction = document.getElementById('direction').value;
  const chance = document.getElementById('chance').value;
  const eng = document.getElementById('eng').checked;

  await fetch(`${SUPABASE_URL}/rest/v1/universities`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      uni,
      city,
      direction,
      chance,
      eng,
      status: 's'
    })
  });

  load();
}

async function deleteUni(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/universities?id=eq.${id}`, {
    method: 'DELETE',
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  load();
}

load();
</script>

</body>
</html>
