    {rank:1,uni:'Albert-Ludwigs-Universität Freiburg',city:'freiburg',st:'s',eng:true,ch:'hi',sub:'Топ экология Германии',dl:'WS: 15 июля',docs:['Диплом по биологии/экологии','CV, мотивационное письмо'],lr:['IELTS 6.0+','TestDaF 4×4'],notes:['Без NC','uni-assist','Граница с Францией и Швейцарией'],ms:['Ecology','Environmental Science','Biology'],pros:['Топ экология','Низкий конкурс','Качество жизни'],cons:['Небольшой город'],tags:['biology','ecology','freiburg','strong','chanceshi','english']},
    {rank:2,uni:'Universität Heidelberg',city:'heidelberg',st:'e',eng:true,ch:'mid',sub:'DKFZ — онкологический центр',dl:'WS: 15 июля',docs:['Диплом по биологии/химии','CV, мотивационное письмо','2 рекомендации'],lr:['IELTS 6.5+','DSH-2 (нем.)'],notes:['Связь с DKFZ','uni-assist'],ms:['Molecular Biosciences','Biochemistry'],pros:['DKFZ рядом','Элитный статус'],cons:['Дороже Фрайбурга'],tags:['biology','ecology','heidelberg','elite','chancesmid','english']}
  ]}
];

/* ── умный парсер запроса ── */
function parseQ(q){var lo=q.toLowerCase();var filters=[];var budget=null;var re=/(\d{3,5})\s*(?:евро|euro|eur|€)/gi,m;while((m=re.exec(lo))!==null){var n=parseInt(m[1]);if(n>=300&&n<=5000){budget=n;filters.push({label:'≤'+n+'€/мес',type:'budget',value:n});}}var cm=[{re:/хорош|высок.{0,10}шанс|низк.{0,10}конкурс|good chance|hohe chance|висок.{0,10}шанс/i,val:'hi',label:'Шансы: высокие'},{re:/средн.{0,10}шанс|medium chance/i,val:'mid',label:'Шансы: средние'},{re:/низк.{0,10}шанс|высок.{0,10}конкурс|low chance/i,val:'low',label:'Шансы: низкие'}];for(var i=0;i<cm.length;i++){if(cm[i].re.test(lo)){filters.push({label:cm[i].label,type:'chance',value:cm[i].val});break;}}var dm=[{re:/медицин|medicine|medizin/i,val:'medicine',label:'Медицина'},{re:/computer science|cs\b|информатик|інформатик|informatik/i,val:'cs',label:'CS'},{re:/machine learning|ml\b|нейросет/i,val:'ml',label:'ML'},{re:/\bai\b|искусств.{0,5}интелл/i,val:'ai',label:'AI'},{re:/машиностроен|инженер|maschinenbau|mechanical/i,val:'mechanical',label:'Машиностроение'},{re:/экономик|wirtschaft|economics/i,val:'economics',label:'Экономика'},{re:/финанс|finance/i,val:'finance',label:'Финансы'},{re:/биолог|biology/i,val:'biology',label:'Биология'},{re:/экологи|ecology/i,val:'ecology',label:'Экология'},{re:/право|law\b/i,val:'law',label:'Право'},{re:/физик|physics/i,val:'physics',label:'Физика'},{re:/математик|mathematics/i,val:'mathematics',label:'Математика'}];for(var i=0;i<dm.length;i++){if(dm[i].re.test(lo))filters.push({label:dm[i].label,type:'tag',value:dm[i].val});}var ctm=[{re:/мюнхен|münchen|munich/i,val:'munich',label:'Мюнхен'},{re:/берлин|berlin/i,val:'berlin',label:'Берлин'},{re:/гейдельберг|heidelberg/i,val:'heidelberg',label:'Гейдельберг'},{re:/\bбонн\b|bonn/i,val:'bonn',label:'Бонн'},{re:/тюбинг|tuebingen/i,val:'tuebingen',label:'Тюбинген'},{re:/дрезден|dresden/i,val:'dresden',label:'Дрезден'},{re:/карлсруэ|karlsruhe/i,val:'karlsruhe',label:'Карлсруэ'},{re:/аахен|aachen/i,val:'aachen',label:'Аахен'},{re:/гамбург|hamburg/i,val:'hamburg',label:'Гамбург'},{re:/кёльн|кельн|cologne/i,val:'cologne',label:'Кёльн'},{re:/франкфурт|frankfurt/i,val:'frankfurt',label:'Франкфурт'},{re:/фрайбург|freiburg/i,val:'freiburg',label:'Фрайбург'}];for(var i=0;i<ctm.length;i++){if(ctm[i].re.test(lo))filters.push({label:ctm[i].label,type:'city',value:ctm[i].val});}if(/\bангл|\bengl|english/i.test(lo))filters.push({label:'Есть англ.',type:'eng',value:true});if(/стипенд|scholarship/i.test(lo))filters.push({label:'Стипендия',type:'tag',value:'scholarship'});return{filters:filters,budget:budget};}
function applyF(e,filters,budget){if(budget!==null&&(CCOST[e.city]||9999)>budget*1.15)return false;for(var i=0;i<filters.length;i++){var f=filters[i];if(f.type==='budget')continue;if(f.type==='chance'&&e.ch!==f.value)return false;if(f.type==='tag'&&(e.tags||[]).indexOf(f.value)<0)return false;if(f.type==='city'&&e.city!==f.value)return false;if(f.type==='eng'&&!e.eng)return false;}return true;}

var AF=[],AB=null;
function renderTags(){var c=document.getElementById('ftags');if(!AF.length&&!AB){c.innerHTML='';return;}c.innerHTML=AF.map(function(f,i){return'<span class="ftag">'+f.label+' <span class="ftag-x" onclick="rmF('+i+')">×</span></span>';}).join('');}
function rmF(i){AF.splice(i,1);AB=null;renderTags();doSearch();}
function doSearch(){var q=document.getElementById('q').value.trim();if(!q){AF=[];AB=null;renderTags();rebuild(null,null);return;}var p=parseQ(q);AF=p.filters;AB=p.budget;renderTags();if(AF.length>0||AB!==null){rebuild(function(e){return applyF(e,AF,AB);},null);}else{rebuild(null,null);}}

function rws(arr,col){return(arr||[]).map(function(x){return'<div class="row"'+(col?' style="color:'+col+'"':'')+'>'+x+'</div>';}).join('');}
function mbd(arr){return(arr||[]).map(function(x){return'<span class="bdg" style="background:#222;color:#888;margin:2px 2px 0 0">'+x+'</span>';}).join('');}

function mkCard(e,sc,ai){var city=CITIES[e.city]||{n:'',c:'mid',cl:''};var pill=sc?'<span class="pill"><span class="dot" style="background:'+CC[city.c]+'"></span>'+city.n+' '+city.cl+'</span>':'';var eng=e.eng?'<span class="bdg blo">Есть англ.</span>':'<span class="bdg" style="background:#1a1a18;color:#555">Только нем.</span>';var top=ai&&ai.reason?'<div class="ag">✓ '+ai.reason+'</div>':'';var bot=ai&&ai.warning?'<div class="aw">⚠ '+ai.warning+'</div>':'';var no=ai&&ai.noR?'<div class="an">✗ '+ai.noR+'</div>':'';var cls=ai?(ai.isNo?'ano':ai.p===1?'a1':ai.p===2?'a2':''):'';var lbl=e._d||e.sub||'';return'<div class="card '+cls+'">'+top+'<div class="ch" onclick="togC(this)"><span class="cr">'+(e.rank||'·')+'</span><div class="ci"><div class="cn">'+e.uni+'</div><div class="cs">'+lbl+'</div></div><div class="bgs">'+pill+'<span class="bdg '+SC[e.st]+'">'+SL[e.st]+'</span>'+eng+'<span class="bdg '+CHC[e.ch]+'">'+CHL[e.ch]+'</span></div><span class="chev">▼</span></div><div class="cb"><div><div class="cl">Язык</div>'+rws(e.lr)+'<div class="cl">Документы</div>'+rws(e.docs)+'<div class="cl">Дедлайн</div><div class="row">'+e.dl+'</div></div><div><div class="cl">Особенности</div>'+rws(e.notes)+'<div class="cl">Плюсы</div>'+rws(e.pros,'#4a9a5a')+'<div class="cl">Минусы</div>'+rws(e.cons,'#c84a4a')+'<div class="cl">Магистратура</div><div style="margin-top:2px">'+mbd(e.ms)+'</div></div></div>'+bot+no+'</div>';}

function bDir(fn,am){var h='';for(var i=0;i<DATA.length;i++){var d=DATA[i];var ents=fn?d.entries.filter(fn):d.entries.slice();if(am){ents=d.entries.slice();ents.sort(function(a,b){var ka=a.uni+'::'+d.dir,kb=b.uni+'::'+d.dir;var da=am[ka]||null,db=am[kb]||null;var pa=da&&!da.isNo?da.p:50,pb=db&&!db.isNo?db.p:50;var na=da&&da.isNo?1:0,nb=db&&db.isNo?1:0;return(na-nb)||(pa-pb);});}if(!ents.length)continue;var o=fn||am?'open':'';var cnt=am?ents.filter(function(e){var k=e.uni+'::'+d.dir;return am[k]&&!am[k].isNo;}).length:ents.length;var meta=am?cnt+' подходит':cnt+' вузов';var cards=ents.map(function(e){var ai=am?(am[e.uni+'::'+d.dir]||null):null;return mkCard(Object.assign({},e,{_d:d.dir}),true,ai);}).join('');h+='<div class="sh" onclick="togS(this)"><span class="st">'+d.dir+'</span><span class="sm">'+meta+'</span><span class="chev '+o+'">▼</span></div><div class="sb '+o+'">'+cards+'</div>';}document.getElementById('vdir').innerHTML=h||'<div class="empty">Ничего не найдено</div>';}
function bCity(fn,am){var bC={};for(var i=0;i<DATA.length;i++){for(var j=0;j<DATA[i].entries.length;j++){var e=DATA[i].entries[j];var ai=am?(am[e.uni+'::'+DATA[i].dir]||null):null;if(fn&&!fn(e))continue;if(am&&!ai)continue;if(!bC[e.city])bC[e.city]=[];bC[e.city].push({e:Object.assign({},e,{_d:DATA[i].dir}),ai:ai});}}var h='';for(var i=0;i<CORD.length;i++){var cid=CORD[i];if(!bC[cid]||!bC[cid].length)continue;var city=CITIES[cid];var sorted=bC[cid].slice().sort(function(a,b){if(am){var pa=a.ai&&!a.ai.isNo?a.ai.p:50,pb=b.ai&&!b.ai.isNo?b.ai.p:50;return pa-pb;}return SV[a.e.st]-SV[b.e.st];});var o=fn||am?'open':'';var cards=sorted.map(function(x,idx){return mkCard(Object.assign({},x.e,{rank:idx+1}),false,x.ai);}).join('');h+='<div class="sh" onclick="togS(this)"><span class="st">'+city.n+'</span><span class="sm">'+city.l+' · <span style="color:'+CC[city.c]+'">'+city.cl+'</span></span><span class="chev '+o+'">▼</span></div><div class="sb '+o+'">'+cards+'</div>';}document.getElementById('vcity').innerHTML=h||'<div class="empty">Ничего не найдено</div>';}
function bUni(fn,am){var bU={};for(var i=0;i<DATA.length;i++){for(var j=0;j<DATA[i].entries.length;j++){var e=DATA[i].entries[j];var ai=am?(am[e.uni+'::'+DATA[i].dir]||null):null;if(fn&&!fn(e))continue;if(am&&!ai)continue;if(!bU[e.uni]){bU[e.uni]=Object.assign({},e,{dirs:[],bAI:null});}bU[e.uni].dirs.push(DATA[i].dir);if(ai&&!ai.isNo&&(!bU[e.uni].bAI||bU[e.uni].bAI.isNo||(ai.p||99)<(bU[e.uni].bAI.p||99)))bU[e.uni].bAI=ai;else if(ai&&ai.isNo&&!bU[e.uni].bAI)bU[e.uni].bAI=ai;}}var vals=Object.keys(bU).map(function(k){return bU[k];});vals.sort(function(a,b){if(am){var pa=a.bAI&&!a.bAI.isNo?a.bAI.p:50,pb=b.bAI&&!b.bAI.isNo?b.bAI.p:50;return pa-pb;}return SV[a.st]-SV[b.st]||CITIES[a.city].n.localeCompare(CITIES[b.city].n);});var h='';for(var i=0;i<vals.length;i++){var v=vals[i];var city=CITIES[v.city];var dH=v.dirs.map(function(d){return'<span class="bdg" style="background:#222;color:#888;margin:2px 2px 0 0">'+d+'</span>';}).join('');var eng=v.eng?'<span class="bdg blo">Есть англ.</span>':'<span class="bdg" style="background:#1a1a18;color:#555">Только нем.</span>';var ai=v.bAI;var top=ai&&ai.reason?'<div class="ag">✓ '+ai.reason+'</div>':'';var bot=ai&&ai.warning?'<div class="aw">⚠ '+ai.warning+'</div>':'';var no=ai&&ai.noR?'<div class="an">✗ '+ai.noR+'</div>':'';var cls=ai?(ai.isNo?'ano':ai.p===1?'a1':ai.p===2?'a2':''):'';h+='<div class="card '+cls+'">'+top+'<div class="ch" onclick="togC(this)"><span class="cr">'+(i+1)+'</span><div class="ci"><div class="cn">'+v.uni+'</div><div class="cs">'+city.n+' · <span style="color:'+CC[city.c]+'">'+city.cl+'</span></div></div><div class="bgs"><span class="bdg '+SC[v.st]+'">'+SL[v.st]+'</span>'+eng+'<span class="bdg '+CHC[v.ch]+'">'+CHL[v.ch]+'</span></div><span class="chev">▼</span></div><div class="cb"><div><div class="cl">Направления</div><div style="margin-bottom:6px">'+dH+'</div><div class="cl">Язык</div>'+rws(v.lr)+'<div class="cl">Документы</div>'+rws(v.docs)+'<div class="cl">Дедлайн</div><div class="row">'+v.dl+'</div></div><div><div class="cl">Особенности</div>'+rws(v.notes)+'<div class="cl">Плюсы</div>'+rws(v.pros,'#4a9a5a')+'<div class="cl">Минусы</div>'+rws(v.cons,'#c84a4a')+'<div class="cl">Магистратура</div><div style="margin-top:2px">'+mbd(v.ms)+'</div></div></div>'+bot+no+'</div>';}document.getElementById('vuni').innerHTML=h||'<div class="empty">Ничего не найдено</div>';}
function rebuild(fn,am){bDir(fn,am);bCity(fn,am);bUni(fn,am);}
function togS(h){var b=h.nextElementSibling,c=h.querySelector('.chev');var o=b.classList.toggle('open');if(c)c.classList.toggle('open',o);}
function togC(h){var b=h.nextElementSibling;if(!b)return;var c=h.querySelector('.chev');var o=b.classList.toggle('open');if(c)c.classList.toggle('open',o);b.style.display=o?'grid':'none';}
function swV(n,el){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});document.getElementById('v'+n).classList.add('active');}
function setL(lang,el){G.lang=lang;document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active');});el.classList.add('active');var h=document.getElementById('hint');h.textContent=G.ai?AHINTS[lang]:HINTS[lang];var q=document.getElementById('q').value;if(q.trim()&&!G.ai)doSearch();}
function onIn(v){if(G.ai){clearTimeout(G.timer);return;}clearTimeout(G.timer);G.timer=setTimeout(function(){doSearch();},300);}
function togAI(){G.ai=!G.ai;var btn=document.getElementById('aibtn'),sb=document.getElementById('sbtn'),h=document.getElementById('hint'),bar=document.getElementById('aibar'),inp=document.getElementById('q');if(G.ai){btn.classList.add('active');btn.textContent='✦ AI';sb.classList.add('visible');h.textContent=AHINTS[G.lang];h.className='hint ai-mode';inp.placeholder='Опишите клиента...';inp.focus();}else{btn.classList.remove('active');btn.textContent='✦ AI';sb.classList.remove('visible');h.textContent=HINTS[G.lang];h.className='hint';bar.style.display='none';inp.placeholder='Поиск... (медицина, 800 евро, хорошие шансы)';var q=inp.value;if(q.trim())doSearch();else rebuild(null,null);}}
function sendAI(){var v=document.getElementById('q').value.trim();if(v.length>2)runAI(v);}

async function runAI(query) {
  var btn=document.getElementById('aibtn'), sb=document.getElementById('sbtn');
  btn.innerHTML='<span class="dots"><span></span><span></span><span></span></span>';
  sb.textContent='…'; sb.style.pointerEvents='none';

  var cat = DATA.map(function(d){ return { dir:d.dir, entries:d.entries.map(function(e){ return { id:e.uni+'::'+d.dir, uni:e.uni, city:CITIES[e.city].n, status:SL[e.st], chance:CHL[e.ch], eng:e.eng, cost:CITIES[e.city].cl, costNum:CCOST[e.city], tags:e.tags, pros:e.pros, cons:e.cons }; })}; });

  var sys = 'Ты — куратор по поступлению в немецкие вузы.\nКАТАЛОГ: ' + JSON.stringify(cat) + '\nПодбери варианты под описание клиента.\nВерни ТОЛЬКО JSON без markdown:\n{"summary":"1-2 предложения","top":[{"id":"Вуз::Направление","p":1,"reason":"почему подходит","warning":"риск или null"}],"no":[{"id":"Вуз::Направление","reason":"почему не подходит"}]}\np: 1=отлично, 2=с оговорками, 3=возможный. Макс 6 в top, 2-3 в no.';

  try {
    var resp = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: sys, userMessage: query })
    });
    var data = await resp.json();
    if (data.error) throw new Error(data.error);
    var raw = data.text || '';
    var parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    var bar = document.getElementById('aibar');
    if (parsed.summary) { bar.innerHTML = '<strong>Анализ:</strong> ' + parsed.summary; bar.style.display = 'block'; }
    var am = {};
    (parsed.top||[]).forEach(function(x){ am[x.id]={isNo:false,p:x.p,reason:x.reason,warning:x.warning||null}; });
    (parsed.no||[]).forEach(function(x){ am[x.id]={isNo:true,p:99,noR:x.reason}; });
    rebuild(null, am);
  } catch(err) {
    var bar = document.getElementById('aibar');
    bar.textContent = 'Ошибка: ' + (err.message || 'попробуйте снова');
    bar.style.display = 'block';
  }
  btn.classList.add('active'); btn.textContent = '✦ AI';
  sb.textContent = '↵'; sb.style.pointerEvents = '';
}

rebuild(null, null);
</script>
