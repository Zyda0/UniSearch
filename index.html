<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>UniSearch</title>

<style>
body {
  background: #0f0f0f;
  color: #eee;
  font-family: Arial;
  padding: 20px;
}

h2 {
  border-bottom: 1px solid #333;
  padding: 10px;
}

.card {
  border: 1px solid #333;
  padding: 15px;
  margin: 10px 0;
  background: #111;
}

/* админ кнопка */
#adminBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  border: 1px solid #444;
  color: white;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  cursor: pointer;
}

/* админ панель */
#adminPanel {
  display: none;
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: #111;
  border: 1px solid #444;
  padding: 20px;
}
</style>

</head>
<body>

<h1>UniSearch</h1>

<div id="app"></div>

<!-- ⚙️ кнопка -->
<button id="adminBtn">⚙️</button>

<!-- админ панель -->
<div id="adminPanel">
  <input id="adminPass" placeholder="Password"><br><br>
  <button onclick="checkAdmin()">Login</button>

  <div id="adminContent" style="display:none;">
    <hr>
    <input id="uni" placeholder="Название"><br><br>
    <input id="city" placeholder="Город"><br><br>
    <input id="direction" placeholder="Направление"><br><br>

    <button onclick="addUni()">Добавить</button>
  </div>
</div>

<script>

// 🔥 ВСТАВЬ СВОИ ДАННЫЕ
const SUPABASE_URL = 'https://hbkltwkspfbnjoltfxby.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LH9wJzvN8Img4roHKalcKQ_CiRxtp3d';

const ADMIN_PASSWORD = "Wawaza1226";

let DATA = [];

// =======================
// загрузка данных
// =======================

async function loadData() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/universities?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const rows = await res.json();

  const grouped = {};

  rows.forEach(r => {
    if (!grouped[r.direction]) grouped[r.direction] = [];

    grouped[r.direction].push(r);
  });

  DATA = grouped;

  render();
}

// =======================
// рендер
// =======================

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  Object.keys(DATA).forEach(dir => {
    const section = document.createElement('div');

    section.innerHTML = `<h2>${dir}</h2>`;

    DATA[dir].forEach(u => {
      section.innerHTML += `
        <div class="card">
          <b>${u.uni}</b> (${u.city})<br>
          шанс: ${u.chance}
        </div>
      `;
    });

    app.appendChild(section);
  });
}

// =======================
// админка
// =======================

document.getElementById('adminBtn').onclick = () => {
  const panel = document.getElementById('adminPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
};

function checkAdmin() {
  const pass = document.getElementById('adminPass').value;

  if (pass === ADMIN_PASSWORD) {
    document.getElementById('adminContent').style.display = 'block';
  } else {
    alert("Wrong password");
  }
}

async function addUni() {
  const uni = document.getElementById('uni').value;
  const city = document.getElementById('city').value;
  const direction = document.getElementById('direction').value;

  await fetch(`${SUPABASE_URL}/rest/v1/universities`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      uni,
      city,
      direction,
      status: 's',
      chance: 'mid',
      eng: true
    })
  });

  alert("Добавлено");
  loadData();
}

// старт
loadData();

</script>

</body>
</html>
